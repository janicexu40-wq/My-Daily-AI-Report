name: Daily AI Morning Briefing

on:
  schedule:
    # 每天北京时间早上7点运行（UTC时间前一天23点）
    - cron: '0 23 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 必须给写权限，否则无法提交生成的文件
    permissions:
      contents: write

    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4

    - name: 🐍 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 安装核心依赖
      # 安装 aligo(云盘), markdown(网页), edge-tts(语音), feedparser(RSS), lxml(解析OPML)
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests edge-tts markdown dashscope aligo lxml

    - name: 🚀 启动 J记财讯
      env:
        # 传递密钥给 main.py
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        ALIYUN_REFRESH_TOKEN: ${{ secrets.ALIYUN_REFRESH_TOKEN }}
        BARK_KEY: ${{ secrets.BARK_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        # 运行核心 Python 脚本
        # 流程：采集 -> 评分 -> AI分析 -> 生成(TTS清洗) -> 上传云盘 -> 本地删除旧文件
        python main.py

    - name: 📤 同步变更到仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 🟢 关键步骤：git add . 会自动处理 新增、修改 和 删除 的文件
        # 这让 Python 脚本执行的 "os.remove" 能够同步到 GitHub 仓库
        git add .
        
        # 提交信息带上北京时间 (+8 hours)
        git diff --quiet && git diff --staged --quiet || git commit -m "🚀 J记财讯更新：$(date -d '+8 hours' +'%Y-%m-%d %H:%M')"
        
        git push
